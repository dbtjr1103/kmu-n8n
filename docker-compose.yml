services:
  # PostgreSQL Database for n8n
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password_change_me
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n-network

  # n8n Workflow Automation
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_password_change_me
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Seoul
      # OpenCode 연동을 위한 환경 변수
      - OPENCODE_URL=http://opencode:8181
    volumes:
      - n8n_data:/home/node/.n8n
      - ./shared:/shared  # OpenCode와 파일 공유
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-network

  # OpenCode AI Coding Assistant with Oh My OpenCode
  opencode:
    build:
      context: .
      dockerfile: opencode.Dockerfile
    container_name: opencode
    restart: unless-stopped
    ports:
      - "8181:8181"
    command: web --port 8181 --hostname 0.0.0.0
    environment:
      - TERM=xterm-256color
      # OpenCode 서버 인증
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      # AI API Keys (.env 파일에서 설정)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - Z_AI_CODING_PLAN_API_KEY=${Z_AI_CODING_PLAN_API_KEY:-}
    volumes:
      - opencode_workspace:/workspace
      - ./shared:/shared  # n8n과 파일 공유
      - ./opencode-config:/root/.config/opencode  # Oh My OpenCode 설정 (읽기/쓰기)
    working_dir: /workspace
    networks:
      - n8n-network

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  opencode_workspace:
    driver: local

networks:
  n8n-network:
    driver: bridge
